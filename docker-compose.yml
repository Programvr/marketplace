services:
  # PostgreSQL - Base de datos transaccional
  postgres:
    image: postgres:16-alpine
    container_name: marketplace_postgres
    environment:
      POSTGRES_DB: marketplace_db
      POSTGRES_USER: marketplace_user
      POSTGRES_PASSWORD: marketplace_pass
      POSTGRES_ROOT_PASSWORD: rootpass
      TZ: America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - marketplace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace_user -d marketplace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB - Base de datos NoSQL (sin autenticación para desarrollo)
  mongodb:
    image: mongo:7.0
    container_name: marketplace_mongodb
    environment:
      TZ: America/Bogota
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - marketplace_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Application - Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace_app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: America/Bogota
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - marketplace_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  marketplace_network:
    driver: bridge