name: Analizar código con SonarQube Server

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: Ejecutar Análisis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 🔥 CORREGIDO: Java 17 (LTS estable)
    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'  # 

    # 🔍 NUEVO: Verificar versión de Java
    - name: Verificar Java
      run: java -version

    # 🔍 NUEVO: Verificar que los secretos existen
    - name: Verificar secretos
      run: |
        if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
          echo "❌ ERROR: SONAR_TOKEN no está configurado"
          exit 1
        fi
        if [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
          echo "❌ ERROR: SONAR_HOST_URL no está configurado"
          exit 1
        fi
        echo "✅ Secretos configurados correctamente"

    # 🔍 NUEVO: Probar conexión a SonarQube
    - name: Probar conexión a SonarQube
      run: |
        curl -v -u ${{ secrets.SONAR_TOKEN }}: \
          -H "X-Pinggy-No-Screen: true" \
          ${{ secrets.SONAR_HOST_URL }}/api/system/status

    - name: Cache de SonarQube
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    # 🔍 NUEVO: Compilar primero (para ver errores de compilación separados)
    - name: Compilar proyecto
      run: mvn clean compile -B

    - name: Ejecutar análisis de SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
